services:
  app:
    build: .
    container_name: laravel-formation-app
    restart: unless-stopped
    ports:
      - "8000:80"
    working_dir: /app
    volumes:
      - ./laravel-app:/app
    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_URL: http://localhost:8000

      DB_CONNECTION: sqlite
      DB_DATABASE: /app/database/database.sqlite
    depends_on:
      - redis
      - mailpit
    command: >
      sh -c "
        touch /app/database/database.sqlite &&
        php artisan key:generate --force || true &&
        php artisan migrate --force || true &&
        frankenphp php-server -r public/
      "

  redis:
    image: redis:latest
    container_name: laravel-formation-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  mailpit:
    image: axllent/mailpit:latest
    container_name: laravel-formation-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

  selenium:
    image: selenium/standalone-chrome:latest
    depends_on:
      - app
    volumes:
      - /dev/shm:/dev/shm

volumes:
  laravel_storage:
  redis_data:
